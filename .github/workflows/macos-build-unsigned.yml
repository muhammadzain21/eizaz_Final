name: macOS Build (Unsigned)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        run: npm --prefix backend ci

      - name: Generate macOS icon
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "public/hospital_icon.icns" ]; then
            echo "public/hospital_icon.icns already exists; skipping"
            exit 0
          fi
          SRC=""
          if [ -f "public/hospital_icon.png" ]; then SRC="public/hospital_icon.png"; fi
          if [ -z "$SRC" ] && [ -f "public/hospital_icon.jpeg" ]; then SRC="public/hospital_icon.jpeg"; fi
          if [ -z "$SRC" ] && [ -f "public/hospital_icon.jpg" ]; then SRC="public/hospital_icon.jpg"; fi
          if [ -z "$SRC" ]; then
            echo "No source icon found. Add public/hospital_icon.png or .jpg/.jpeg" >&2
            exit 1
          fi

          mkdir -p build/icon.iconset
          # also ensure a PNG exists for other targets
          if [ ! -f "public/hospital_icon.png" ]; then
            sips -s format png "$SRC" --out "public/hospital_icon.png" >/dev/null
          fi

          # Create iconset at required sizes
          sips -z 16 16     "public/hospital_icon.png" --out build/icon.iconset/icon_16x16.png >/dev/null
          sips -z 32 32     "public/hospital_icon.png" --out build/icon.iconset/icon_16x16@2x.png >/dev/null
          sips -z 32 32     "public/hospital_icon.png" --out build/icon.iconset/icon_32x32.png >/dev/null
          sips -z 64 64     "public/hospital_icon.png" --out build/icon.iconset/icon_32x32@2x.png >/dev/null
          sips -z 128 128   "public/hospital_icon.png" --out build/icon.iconset/icon_128x128.png >/dev/null
          sips -z 256 256   "public/hospital_icon.png" --out build/icon.iconset/icon_128x128@2x.png >/dev/null
          sips -z 256 256   "public/hospital_icon.png" --out build/icon.iconset/icon_256x256.png >/dev/null
          sips -z 512 512   "public/hospital_icon.png" --out build/icon.iconset/icon_256x256@2x.png >/dev/null
          sips -z 512 512   "public/hospital_icon.png" --out build/icon.iconset/icon_512x512.png >/dev/null
          sips -z 1024 1024 "public/hospital_icon.png" --out build/icon.iconset/icon_512x512@2x.png >/dev/null

          iconutil -c icns build/icon.iconset -o public/hospital_icon.icns
          echo "Generated public/hospital_icon.icns"

      - name: Build mac (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac:unsigned:${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: warn
